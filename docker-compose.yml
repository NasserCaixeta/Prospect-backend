services:
  postgres:
    image: postgres:16-alpine
    container_name: prospect-postgres
    environment:
      POSTGRES_DB: prospect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - prospect_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prospect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  prospect_postgres_data:
